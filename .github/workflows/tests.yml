name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - support-v1.35
  workflow_dispatch:

jobs:
  unit:
    name: Unit & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: go build -v ./...

      - name: Unit tests with coverage
        run: make test-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false

  e2e-kind:
    name: Kind E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kind
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.24.0

      - name: Run kind e2e
        env:
          K8S_IMAGE: kindest/node:v1.35.0
        run: make e2e-kind

  e2e-kind-enhanced:
    name: Kind E2E (enhanced-kubernetes)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: unit
    env:
      ENHANCED_K8S_REF: kubewharf-1.24.6
      ENHANCED_K8S_IMAGE: enhanced-k8s-node:ci
    steps:
      - name: Check out kubebrain
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kind
        uses: engineerd/setup-kind@v0.6.2
        with:
          version: v0.24.0

      - name: Check out enhanced-kubernetes
        uses: actions/checkout@v4
        with:
          repository: kubewharf/kubernetes
          ref: ${{ env.ENHANCED_K8S_REF }}
          path: enhanced-kubernetes

      - name: Build kind node image from enhanced-kubernetes
        run: |
          kind build node-image \
            --kube-root ./enhanced-kubernetes \
            --image "${ENHANCED_K8S_IMAGE}"

      - name: Run kind e2e on enhanced-kubernetes
        env:
          K8S_IMAGE: ${{ env.ENHANCED_K8S_IMAGE }}
        run: make e2e-kind
